<script>

(function(){
    var scrolledDown=false;
    var btn=document.getElementById('badmintonBtn');
    var racketLabel=document.getElementById('racketLabel');
    var shuttle=document.getElementById('shuttlecock');
    var widgetEl=document.getElementById('badminton-widget');
    if(!btn)return;
    function fireShuttle(fromBottom){
        var rect=widgetEl.getBoundingClientRect();
        var startX=rect.left+rect.width/2-12;
        var startY=fromBottom?rect.top:rect.top+rect.height;
        var endY=fromBottom?-100:window.innerHeight+100;
        shuttle.style.left=startX+'px';shuttle.style.top=startY+'px';
        shuttle.style.display='block';shuttle.classList.remove('flying');
        shuttle.offsetWidth;shuttle.classList.add('flying');
        var start=null,dur=650;
        function step(ts){if(!start)start=ts;var p=Math.min((ts-start)/dur,1);
        shuttle.style.top=(startY+(endY-startY)*p)+'px';
        if(p<1)requestAnimationFrame(step);
        else{shuttle.style.display='none';shuttle.classList.remove('flying');}}
        requestAnimationFrame(step);
    }
    btn.addEventListener('click',function(){
        if(!scrolledDown){
            fireShuttle(true);
            var target=document.getElementById('projectsGrid');
            if(target)target.scrollIntoView({behavior:'smooth',block:'start'});
            scrolledDown=true;racketLabel.textContent='scroll ↑';
            btn.querySelector('.racket-icon').style.transform='scaleY(-1)';
        }else{
            fireShuttle(false);window.scrollTo({top:0,behavior:'smooth'});
            scrolledDown=false;racketLabel.textContent='scroll ↓';
            btn.querySelector('.racket-icon').style.transform='';
        }
    });
    window.addEventListener('scroll',function(){
        var atBottom=window.scrollY>(document.documentElement.scrollHeight/2)*0.4;
        if(atBottom!==scrolledDown){
            scrolledDown=atBottom;
            racketLabel.textContent=scrolledDown?'scroll ↑':'scroll ↓';
            btn.querySelector('.racket-icon').style.transform=scrolledDown?'scaleY(-1)':'';
        }
    });
})();


const cursor=document.getElementById('cursor');
const follower=document.getElementById('cursorFollower');
let mx=0,my=0,fx=0,fy=0;
document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;cursor.style.left=(mx-6)+'px';cursor.style.top=(my-6)+'px';});
(function animCursor(){fx+=(mx-fx)*0.12;fy+=(my-fy)*0.12;follower.style.left=(fx-18)+'px';follower.style.top=(fy-18)+'px';requestAnimationFrame(animCursor);})();


var themeBulb=document.getElementById('themeBulb');
var THEME_KEY='portfolio-theme';
function applyTheme(mode){var isLight=mode==='light';document.body.classList.toggle('light-mode',isLight);if(themeBulb){themeBulb.innerHTML=isLight?'<i class="fas fa-sun"></i>':'<i class="fas fa-lightbulb"></i>';}}
applyTheme(localStorage.getItem(THEME_KEY)==='light'?'light':'dark');
if(themeBulb){themeBulb.addEventListener('click',function(){var next=document.body.classList.contains('light-mode')?'dark':'light';applyTheme(next);localStorage.setItem(THEME_KEY,next);});}


var hamburger=document.getElementById('hamburger');
var navLinks=document.getElementById('navLinks');
hamburger.addEventListener('click',function(){hamburger.classList.toggle('open');navLinks.classList.toggle('open');});


var canvas=document.getElementById('bgCanvas');
var ctx=canvas.getContext('2d');
function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resizeCanvas();window.addEventListener('resize',resizeCanvas);
var stars=[];for(var i=0;i<120;i++)stars.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,r:Math.random()*1.5+0.3,speed:Math.random()*0.3+0.05});
var tick=0;
(function drawBG(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(0,102,255,0.04)';ctx.lineWidth=1;for(var x=0;x<canvas.width;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke();}for(var y=0;y<canvas.height;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke();}stars.forEach(function(s){ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle='rgba(0,168,255,'+(0.3+0.7*Math.abs(Math.sin(tick*0.01+s.x)))+')';ctx.fill();s.y+=s.speed;if(s.y>canvas.height){s.y=0;s.x=Math.random()*canvas.width;}});tick++;requestAnimationFrame(drawBG);})();


var revealObs=new IntersectionObserver(function(entries){entries.forEach(function(en,i){if(en.isIntersecting)setTimeout(function(){en.target.classList.add('visible');},i*80);});},{threshold:0.1});
document.querySelectorAll('.reveal').forEach(function(el){revealObs.observe(el);});


function attachCursorHover() {
    document.querySelectorAll('a,button,.project-card').forEach(function(el){
        el.addEventListener('mouseenter',function(){cursor.style.transform='scale(2)';follower.style.borderColor='var(--green)';});
        el.addEventListener('mouseleave',function(){cursor.style.transform='scale(1)';follower.style.borderColor='var(--blue-bright)';});
    });
}
attachCursorHover();


var popupOverlay=document.getElementById('popupOverlay');
var popupImgContainer=document.getElementById('popupImgContainer');
var popupGallery=document.getElementById('popupGallery');
var DEFAULT_PROJECT_IMAGE='photos/main.png';
var popupImages=[],popupImageIndex=0;

function normalizeImageList(value){
    if(Array.isArray(value))return value.filter(Boolean);
    if(typeof value==='string'){var t=value.trim();if(!t)return[];try{var p=JSON.parse(t);if(Array.isArray(p))return p.filter(Boolean);}catch(_){}return t.split(',').map(function(v){return v.trim();}).filter(Boolean);}
    return[];
}
function showPopupImage(index,title){
    if(!popupImages.length)return;
    var si=(index+popupImages.length)%popupImages.length;
    popupImageIndex=si;
    var hasNav=popupImages.length>1;
    popupImgContainer.innerHTML='<img class="popup-img" src="'+popupImages[popupImageIndex]+'" alt="'+(title||'Project')+'" onerror="this.parentElement.innerHTML=\'<div class=&quot;popup-img-placeholder&quot;>🚀</div>\'">'+(hasNav?'<button class="popup-nav popup-nav-prev" data-dir="prev"><i class="fas fa-chevron-left"></i></button><button class="popup-nav popup-nav-next" data-dir="next"><i class="fas fa-chevron-right"></i></button>':'');
    popupGallery.querySelectorAll('.popup-thumb').forEach(function(t,i){t.classList.toggle('active',i===popupImageIndex);});
}
function renderPopupImages(images,title){
    popupImages=images.length?images:[DEFAULT_PROJECT_IMAGE];
    popupImageIndex=0;
    showPopupImage(0,title);
    if(popupImages.length<=1){popupGallery.style.display='none';popupGallery.innerHTML='';return;}
    popupGallery.style.display='grid';
    popupGallery.innerHTML=popupImages.map(function(img,i){return'<img class="popup-thumb '+(i===0?'active':'')+'" data-index="'+i+'" src="'+img+'" alt="'+(title||'Project')+' '+(i+1)+'" onerror="this.style.display=\'none\'">';}).join('');
    popupGallery.querySelectorAll('.popup-thumb').forEach(function(thumb){thumb.addEventListener('click',function(){showPopupImage(Number(thumb.dataset.index||0),document.getElementById('popupTitle').textContent);});});
}
popupImgContainer.addEventListener('click',function(e){var navBtn=e.target.closest('.popup-nav');if(!navBtn||!popupImages.length)return;var title=document.getElementById('popupTitle').textContent||'Project';if(navBtn.dataset.dir==='prev')showPopupImage(popupImageIndex-1,title);if(navBtn.dataset.dir==='next')showPopupImage(popupImageIndex+1,title);});
document.getElementById('popupClose').addEventListener('click',closePopup);
popupOverlay.addEventListener('click',function(e){if(e.target===popupOverlay)closePopup();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closePopup();if(!popupOverlay.classList.contains('active'))return;var title=document.getElementById('popupTitle').textContent||'Project';if(e.key==='ArrowLeft')showPopupImage(popupImageIndex-1,title);if(e.key==='ArrowRight')showPopupImage(popupImageIndex+1,title);});
function closePopup(){popupOverlay.classList.remove('active');document.body.style.overflow='';}

function openPopup(data) {
    document.getElementById('popupTitle').textContent = data.title||'';
    document.getElementById('popupType').textContent = data.type||'';

    
    var shortDescEl = document.getElementById('popupShortDesc');
    shortDescEl.textContent = data.shortDesc||'';
    shortDescEl.style.display = data.shortDesc ? 'block' : 'none';

    
    var descEl = document.getElementById('popupDesc');
    descEl.textContent = data.desc||'';
    descEl.style.display = data.desc ? 'block' : 'none';

    
    var featuresEl = document.getElementById('popupFeatures');
    var featuresListEl = document.getElementById('popupFeaturesList');
    var features = data.features || [];
    if (features.length) {
        featuresEl.style.display = 'block';
        featuresListEl.innerHTML = features.map(function(f) {
            return '<li style="display:flex;align-items:flex-start;gap:0.5rem;color:var(--gray);font-size:0.95rem;"><span style="color:var(--green);flex-shrink:0;">✓</span>'+f+'</li>';
        }).join('');
    } else {
        featuresEl.style.display = 'none';
        featuresListEl.innerHTML = '';
    }

    
    var techArr = data.tech ? data.tech.split(',') : [];
    document.getElementById('popupTech').innerHTML = techArr.map(function(t){return '<span>'+t.trim()+'</span>';}).join('');

    var demoBtn = document.getElementById('popupDemoBtn');
    var codeBtn = document.getElementById('popupCodeBtn');
    demoBtn.href = data.demo||'#';
    codeBtn.href = data.code||'#';
    demoBtn.style.display = (data.demo && data.demo!=='#') ? '' : 'none';
    codeBtn.style.display = (data.code && data.code!=='#') ? '' : 'none';

    // Images
    var images = normalizeImageList(data.images);
    if (!images.length && data.img) images = [data.img];
    renderPopupImages(images, data.title||'Project');

    popupOverlay.classList.add('active');
    document.body.style.overflow = 'hidden';
}


function attachFilters() {
    var filterBtns = document.querySelectorAll('.filter-btn');
    var cards = document.querySelectorAll('.project-card');
    filterBtns.forEach(function(btn) {
        btn.addEventListener('click', function() {
            filterBtns.forEach(function(b){b.classList.remove('active');});
            btn.classList.add('active');
            var filter = btn.getAttribute('data-filter');
            var count = 0;
            cards.forEach(function(card) {
                var cats = (card.getAttribute('data-category')||'').toLowerCase();
                var show = filter==='all' || cats.includes(filter);
                card.style.display = show ? '' : 'none';
                if (show) count++;
            });
            document.getElementById('noResults').style.display = count===0?'block':'none';
        });
    });
}
</script>


<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, collection, getDocs, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig = {
    apiKey: "AIzaSyADglpxL2r1WAO9ibWG2FFwLMzaWm7zMrM",
    authDomain: "sanketh-portfolio.firebaseapp.com",
    projectId: "sanketh-portfolio",
    storageBucket: "sanketh-portfolio.firebasestorage.app",
    messagingSenderId: "569043022670",
    appId: "1:569043022670:web:2cf12217fc00d49cc8641f"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

function esc(str){return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function normalizeImageList(value){
    if(Array.isArray(value))return value.filter(Boolean);
    if(typeof value==='string'){var t=value.trim();if(!t)return[];try{var p=JSON.parse(t);if(Array.isArray(p))return p.filter(Boolean);}catch(_){}return t.split(',').map(v=>v.trim()).filter(Boolean);}
    return[];
}

function buildCard(p, num) {
    const tech = Array.isArray(p.tech) ? p.tech : (p.tech ? [p.tech] : []);
    const techBadges = tech.slice(0, 4).map(t=>`<span class="tech-badge">${esc(t)}</span>`).join('');
    const techAll = tech.join(',');
    const numStr = String(num).padStart(2,'0');
    const images = normalizeImageList(p.images).length ? normalizeImageList(p.images) : normalizeImageList(p.photos);
    const img = p.image || (images[0] || 'photos/main.png');
    const allImages = images.length ? images : [img];
    const imagesJson = JSON.stringify(allImages);
    const cats = Array.isArray(p.categories) ? p.categories.join(' ') : (p.categories||'');
    const features = Array.isArray(p.features) ? p.features : [];
    const featuresJson = JSON.stringify(features);
    const descJson = JSON.stringify(p.description || '');
    const shortDesc = p.shortDesc || (p.description||'').substring(0,120) + (p.description && p.description.length > 120 ? '...' : '');
    const hasDemo = p.demoUrl && p.demoUrl !== '#';
    const hasCode = p.codeUrl && p.codeUrl !== '#';

    return `<div class="project-card"
        data-category="${esc(cats)}"
        data-title="${esc(p.title||'')}"
        data-short-desc="${esc(p.shortDesc||'')}"
        data-desc="${esc(descJson)}"
        data-features="${esc(featuresJson)}"
        data-tech="${esc(techAll)}"
        data-type="${esc(p.type||'Project')}"
        data-img="${esc(img)}"
        data-images="${esc(imagesJson)}"
        data-demo="${esc(p.demoUrl||'#')}"
        data-code="${esc(p.codeUrl||'#')}"
        style="animation:fadeUp 0.5s ease ${(num-1)*0.08}s both;">
        <div class="project-img">
            <img src="${esc(img)}" alt="${esc(p.title||'')}" onerror="this.src='https://via.placeholder.com/400x220/002266/00a8ff?text=Project'">
            <div class="project-img-overlay"></div>
            <div class="project-num">${numStr}</div>
            <div class="project-type-badge">${esc(p.type||'Project')}</div>
        </div>
        <div class="project-body">
            <h3>${esc(p.title||'Untitled')}</h3>
            <p>${esc(shortDesc)}</p>
            <div class="tech-badges">${techBadges}</div>
            <div class="project-links-row">
                ${hasDemo?`<a href="${esc(p.demoUrl)}" class="link-demo" target="_blank"><i class="fas fa-eye"></i> Live </a>`:''}
                ${hasCode?`<a href="${esc(p.codeUrl)}" class="link-code" target="_blank"><i class="fab fa-github"></i> Code</a>`:''}
            </div>
        </div>
    </div>`;
}


async function loadAllProjects() {
  const grid = document.getElementById('projectsGrid');
  try {
    const q = query(collection(db,'projects'), orderBy('order','asc'));
    const snap = await getDocs(q);
    grid.innerHTML = '';

    if (snap.empty) {
      grid.innerHTML = '<div class="firebase-error" style="grid-column:1/-1;">No projects found.</div>';
      return;
    }

    let count = 0;
    snap.forEach(docSnap => {
      count++;
      const p = docSnap.data();
      const html = buildCard(p, count).replace(
        'class="project-card"',
        `class="project-card" data-id="${docSnap.id}"`
      );
      grid.innerHTML += html;
    });

    if (typeof attachFilters === 'function') attachFilters();

    document.querySelectorAll('.project-card').forEach(card => {
      card.addEventListener('click', e => {
        if (e.target.closest('a')) return;
        const id = card.dataset.id;
        if (id) window.location.href = `project.html?id=${encodeURIComponent(id)}`;
      });
    });
  } catch (err) {
    console.error(err);
    grid.innerHTML = '<div class="firebase-error" style="grid-column:1/-1;">Could not load projects.</div>';
  }
}

loadAllProjects();

</script>
